<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gastos — Login Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0B1F1C;
    --bg-input:  rgba(255,255,255,0.07);
    --border:    rgba(255,255,255,0.10);
    --bf:        rgba(100,230,180,0.55);
    --accent:    #3DFFC0;
    --text1:     #F0F5F3;
    --text2:     rgba(240,245,243,0.55);
    --text3:     rgba(240,245,243,0.30);
    --font-d: 'Syne', sans-serif;
    --font-b: 'DM Sans', sans-serif;
  }

  html, body {
    min-height: 100%; background: #081A17;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-b);
  }

  .phone {
    width: 390px; height: 844px;
    background: var(--bg);
    border-radius: 50px; overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 40px 100px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .blob { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(61,255,192,0.18) 0%, transparent 70%); top: -80px; left: -60px; }
  .blob-2 { width: 240px; height: 240px; background: radial-gradient(circle, rgba(30,180,120,0.12) 0%, transparent 70%); bottom: 120px; right: -60px; }

  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 34px; background: #000; border-radius: 0 0 20px 20px; z-index: 20; }
  .notch-cam { position: absolute; top: 8px; right: 22px; width: 12px; height: 12px; background: #1a1a1a; border-radius: 50%; border: 2px solid #222; }

  .status-bar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px 0;
    font-family: var(--font-d); font-size: 15px; font-weight: 600; color: var(--text1);
  }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .content {
    position: relative; z-index: 5;
    height: calc(100% - 48px);
    padding: 0 32px 36px;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .content::-webkit-scrollbar { display: none; }

  /* LOGO */
  .logo-section {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 44px; padding-bottom: 36px;
    animation: fu 0.55s ease both;
  }
  .logo-mark { width: 72px; height: 72px; margin-bottom: 20px; }
  .logo-title { font-family: var(--font-d); font-size: 32px; font-weight: 800; color: var(--text1); letter-spacing: -0.5px; margin-bottom: 6px; }
  .logo-sub { font-size: 14px; color: var(--text2); font-weight: 300; letter-spacing: 0.2px; }

  /* TABS */
  .auth-tabs {
    display: flex; background: rgba(61,255,192,0.06); border-radius: 14px; padding: 4px; gap: 4px; margin-bottom: 28px;
    animation: fu 0.55s 0.06s ease both;
  }
  .auth-tab {
    flex: 1; height: 40px; border-radius: 11px; border: none; background: transparent;
    font-family: var(--font-b); font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.2s;
  }
  .auth-tab.active { background: rgba(61,255,192,0.12); color: var(--accent); }

  /* HEADINGS */
  .form-heading { font-family: var(--font-d); font-size: 22px; font-weight: 700; color: var(--text1); margin-bottom: 5px; animation: fu 0.55s 0.09s ease both; }
  .form-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; animation: fu 0.55s 0.12s ease both; }

  /* INPUTS */
  .iw { position: relative; margin-bottom: 12px; animation: fu 0.55s ease both; }
  .iw:nth-child(1) { animation-delay: 0.17s; }
  .iw:nth-child(2) { animation-delay: 0.22s; }
  .iicon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text3); display: flex; pointer-events: none; }
  .field {
    width: 100%; height: 54px;
    background: var(--bg-input);
    border: 1px solid var(--border); border-radius: 16px;
    color: var(--text1); font-family: var(--font-b); font-size: 15px;
    padding: 0 44px 0 46px; outline: none;
    transition: border-color 0.2s, background 0.2s; -webkit-appearance: none;
  }
  .field::placeholder { color: var(--text3); }
  .field:focus { border-color: var(--bf); background: rgba(61,255,192,0.04); }
  .eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; display: flex; padding: 4px; }

  /* FORGOT */
  .forgot-row { display: flex; justify-content: flex-end; margin: 4px 0 24px; animation: fu 0.55s 0.28s ease both; }
  .forgot-link { font-size: 13px; color: var(--accent); text-decoration: none; opacity: 0.85; }
  .forgot-link:hover { opacity: 1; }

  /* CTA */
  .btn-cta {
    width: 100%; height: 58px; border-radius: 20px; border: none;
    background: var(--accent); color: #081A17;
    font-family: var(--font-d); font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer; box-shadow: 0 8px 32px rgba(61,255,192,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fu 0.55s 0.32s ease both;
  }
  .btn-cta:hover { transform: translateY(-1px); box-shadow: 0 12px 40px rgba(61,255,192,0.35); }
  .btn-cta:active { transform: scale(0.98); }

  /* DIVIDER */
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; animation: fu 0.55s 0.37s ease both; }
  .dline { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .dtext { font-size: 13px; color: var(--text3); white-space: nowrap; }

  /* SOCIAL */
  .social-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 32px; animation: fu 0.55s 0.42s ease both; }
  .social-btn {
    flex: 1; height: 54px; border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--bg-input); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .social-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.09); }

  /* FOOTER */
  .footer-link { text-align: center; font-size: 14px; color: var(--text2); animation: fu 0.55s 0.47s ease both; }
  .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }

  @keyframes fu { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"><div class="notch-cam"></div></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="1" fill="white" opacity="0.35"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1" fill="white" opacity="0.6"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="1" fill="white" opacity="0.85"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 10a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z" fill="white"/>
        <path d="M4.5 7.5C5.6 6.4 6.7 5.8 8 5.8s2.4.6 3.5 1.7" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <path d="M2 5C3.8 3.2 5.8 2.3 8 2.3s4.2.9 6 2.7" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="white"/>
        <path d="M23 4v4a2 2 0 0 0 0-4Z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <div class="content">

    <div class="logo-section">
      <div class="logo-mark">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
          <circle cx="36" cy="36" r="36" fill="rgba(61,255,192,0.10)"/>
          <circle cx="36" cy="36" r="35.5" stroke="rgba(61,255,192,0.25)" stroke-width="1"/>
          <rect x="18" y="16" width="6" height="40" rx="3" fill="#3DFFC0"/>
          <line x1="24" y1="36" x2="46" y2="18" stroke="#3DFFC0" stroke-width="6" stroke-linecap="round"/>
          <polyline points="24,52 34,42 42,48 54,33" stroke="#3DFFC0" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <polyline points="46,31 54,31 54,39" stroke="#3DFFC0" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="logo-title">Gastos</div>
      <div class="logo-sub">Tu gestor financiero personal</div>
    </div>

    <div id="form-login">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="auth-tab" onclick="switchTab('register')">Crear cuenta</button>
      </div>

      <div class="form-heading">Bienvenido</div>
      <div class="form-sub">Ingresa a tu cuenta para continuar</div>

      <div class="iw">
        <div class="iicon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 14s0-4 6-4 6 4 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/></svg></div>
        <input class="field" type="email" placeholder="Correo electrónico">
      </div>

      <div class="iw">
        <div class="iicon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="8" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M6 8V6a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="9" cy="12" r="1.2" fill="currentColor"/></svg></div>
        <input class="field" type="password" id="p1" placeholder="Contraseña">
        <button class="eye" onclick="tp('p1')"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5Z" stroke="currentColor" stroke-width="1.4"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg></button>
      </div>

      <div class="forgot-row"><a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a></div>

      <button class="btn-cta">Iniciar sesión</button>

      <div class="divider"><div class="dline"></div><span class="dtext">o continúa con</span><div class="dline"></div></div>

      <div class="social-row">
        <button class="social-btn">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M20.64 11.2c0-.637-.057-1.251-.164-1.84H11v3.481h5.419a4.63 4.63 0 0 1-2.008 3.04v2.524h3.252c1.9-1.75 3-4.33 3-5.744" fill="#4285F4"/><path d="M11 21c2.7 0 4.964-.895 6.618-2.423l-3.252-2.524C13.38 16.78 12.29 17.1 11 17.1c-2.61 0-4.82-1.762-5.61-4.13H2.04v2.607A9.997 9.997 0 0 0 11 21" fill="#34A853"/><path d="M5.39 12.97A6.015 6.015 0 0 1 5.07 11c0-.684.12-1.348.32-1.97V6.423H2.04A9.997 9.997 0 0 0 1 11c0 1.612.386 3.138 1.04 4.577l3.35-2.607Z" fill="#FBBC05"/><path d="M11 4.9c1.47 0 2.791.506 3.83 1.5l2.872-2.872C15.96 1.99 13.697 1 11 1A9.997 9.997 0 0 0 2.04 6.423l3.35 2.607C6.18 6.66 8.39 4.9 11 4.9" fill="#EA4335"/></svg>
        </button>
        <button class="social-btn">
          <svg width="20" height="22" viewBox="0 0 814 1000" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.8 0 695.6 0 604.1c0-106.5 56.8-162.7 108.2-163.7 42.2-.9 83.3 29.8 107.3 29.8c23.9 0 71.8-35.4 124.4-35.4 20.3 0 80.4 2.4 118.4 54.7zm-159.8-67.6c3.2-17.6 4.5-34.2 4.5-50.7 0-63.7-26.6-112.8-74.3-150.3C528.6 37.7 479 17 424.4 17c-3 17.4-5.4 34.5-5.4 51.8 0 70.3 27.2 127.3 75 169.5 45.4 40.1 100 65.7 134.3 35.0z"/></svg>
        </button>
      </div>

      <div class="footer-link">¿No tienes cuenta? <a href="#" onclick="switchTab('register');return false;">Regístrate</a></div>
    </div>

    <div id="form-register" style="display:none;">
      <div class="auth-tabs">
        <button class="auth-tab" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="auth-tab active" onclick="switchTab('register')">Crear cuenta</button>
      </div>

      <div class="form-heading">Crear cuenta</div>
      <div class="form-sub">Empieza a gestionar tus finanzas</div>

      <div class="iw">
        <div class="iicon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 14s0-4 6-4 6 4 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/></svg></div>
        <input class="field" type="text" placeholder="Nombre completo">
      </div>
      <div class="iw">
        <div class="iicon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M2 7l7 4 7-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>
        <input class="field" type="email" placeholder="Correo electrónico">
      </div>
      <div class="iw" style="margin-bottom:26px;">
        <div class="iicon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="8" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M6 8V6a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>
        <input class="field" type="password" id="p2" placeholder="Contraseña">
        <button class="eye" onclick="tp('p2')"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5Z" stroke="currentColor" stroke-width="1.4"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg></button>
      </div>

      <button class="btn-cta">Crear cuenta</button>

      <div class="divider"><div class="dline"></div><span class="dtext">o continúa con</span><div class="dline"></div></div>

      <div class="social-row">
        <button class="social-btn">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M20.64 11.2c0-.637-.057-1.251-.164-1.84H11v3.481h5.419a4.63 4.63 0 0 1-2.008 3.04v2.524h3.252c1.9-1.75 3-4.33 3-5.744" fill="#4285F4"/><path d="M11 21c2.7 0 4.964-.895 6.618-2.423l-3.252-2.524C13.38 16.78 12.29 17.1 11 17.1c-2.61 0-4.82-1.762-5.61-4.13H2.04v2.607A9.997 9.997 0 0 0 11 21" fill="#34A853"/><path d="M5.39 12.97A6.015 6.015 0 0 1 5.07 11c0-.684.12-1.348.32-1.97V6.423H2.04A9.997 9.997 0 0 0 1 11c0 1.612.386 3.138 1.04 4.577l3.35-2.607Z" fill="#FBBC05"/><path d="M11 4.9c1.47 0 2.791.506 3.83 1.5l2.872-2.872C15.96 1.99 13.697 1 11 1A9.997 9.997 0 0 0 2.04 6.423l3.35 2.607C6.18 6.66 8.39 4.9 11 4.9" fill="#EA4335"/></svg>
        </button>
        <button class="social-btn">
          <svg width="20" height="22" viewBox="0 0 814 1000" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.8 0 695.6 0 604.1c0-106.5 56.8-162.7 108.2-163.7 42.2-.9 83.3 29.8 107.3 29.8c23.9 0 71.8-35.4 124.4-35.4 20.3 0 80.4 2.4 118.4 54.7zm-159.8-67.6c3.2-17.6 4.5-34.2 4.5-50.7 0-63.7-26.6-112.8-74.3-150.3C528.6 37.7 479 17 424.4 17c-3 17.4-5.4 34.5-5.4 51.8 0 70.3 27.2 127.3 75 169.5 45.4 40.1 100 65.7 134.3 35.0z"/></svg>
        </button>
      </div>

      <div class="footer-link">¿Ya tienes cuenta? <a href="#" onclick="switchTab('login');return false;">Inicia sesión</a></div>
    </div>

  </div>
</div>

<script>
  function switchTab(t) {
    document.getElementById('form-login').style.display = t==='login'?'block':'none';
    document.getElementById('form-register').style.display = t==='login'?'none':'block';
  }
  function tp(id) {
    const el = document.getElementById(id);
    el.type = el.type==='password' ? 'text' : 'password';
  }
</script>
</body>
</html>
